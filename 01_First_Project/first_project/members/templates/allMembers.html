{% extends 'master.html' %}

{% block title %}
First Project - Members
{% endblock %}

{% block content %}

<p><a href="{% url 'main' %}">HOME</a></p>

<h1>Members</h1>

<ul>
{% for x in mymembers %}
    <li>
        <a href="{% url 'details' x.id %}">
            {{ x.firstname }} {{ x.lastname }}
        </a>
    </li>
{% empty %}
    <li>No members found.</li>
{% endfor %}
</ul>

{% endblock %}
